<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vitalsy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        /* 🔥 CRITICAL: Page is invisible by default */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #05070A; 
            color: #E2E8F0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
            opacity: 0; 
            transition: opacity 0.3s ease; 
        }
        
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .emerald-gradient { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
        .emerald-glow { box-shadow: 0 0 50px -10px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-emerald-500/5 blur-[120px] -z-10"></div>

    <div class="w-full max-w-md glass p-12 rounded-[2.5rem] border border-emerald-500/20 emerald-glow text-center">
        <div class="flex items-center justify-center gap-2 mb-10">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
                <i class="fas fa-microscope text-white text-xs"></i>
            </div>
            <span class="text-2xl font-black tracking-tighter text-white uppercase italic">Vitals<span class="text-emerald-500">y.</span></span>
        </div>

        <h2 class="text-3xl font-extrabold text-white mb-2 italic uppercase tracking-tighter">Welcome Back</h2>
        <p class="text-gray-500 text-sm mb-10">Sign in to access your clinical history.</p>

        <form id="loginForm" class="space-y-6 text-left">
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2 tracking-[0.2em]">Clinical Email</label>
                <input type="email" id="email" placeholder="name@company.com" class="w-full bg-[#0A0F1C] border border-gray-800 p-4 rounded-2xl focus:border-emerald-500 outline-none transition text-white" required>
            </div>
            <div>
                <div class="flex justify-between items-center mb-2 px-2">
                    <label class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Password</label>
                    <a href="#" class="text-[10px] text-emerald-500 font-bold uppercase hover:underline">Forgot?</a>
                </div>
                <input type="password" id="password" placeholder="••••••••" class="w-full bg-[#0A0F1C] border border-gray-800 p-4 rounded-2xl focus:border-emerald-500 outline-none transition text-white" required>
            </div>

            <button id="loginBtn" type="submit" class="w-full emerald-gradient py-5 rounded-2xl font-black text-white shadow-lg hover:brightness-110 transition uppercase tracking-widest">
                Sign In
            </button>
        </form>

        <p class="mt-10 text-sm text-gray-500 italic">
            New to Vitalsy? <a href="signup.html" class="text-emerald-500 font-bold hover:underline underline-offset-4">Create Account</a>
        </p>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDmKTFt6NJWj1hHwjBYd01iRdUMrYmhmVw",
    authDomain: "vitalsy-ai-526dd.firebaseapp.com",
    projectId: "vitalsy-ai-526dd",
    storageBucket: "vitalsy-ai-526dd.firebasestorage.app",
    messagingSenderId: "633271456266",
    appId: "1:633271456266:web:bbc783979dbf23e2d845f3",
    measurementId: "G-4VZ0GZD332"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Set Persistence to Local
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
    .catch((err) => console.error("Persistence error:", err));

// 🔥 REVOLUTIONARY REDIRECT LOGIC
auth.onAuthStateChanged((user) => {
    if (user) {
        // If logged in, jump to main immediately. replace() prevents the back-button loop.
        window.location.replace("main.html");
    } else {
        // ONLY show the login form if we are 100% sure the user is logged out.
        document.body.style.opacity = "1";
    }
});

const form = document.getElementById('loginForm');
const btn = document.getElementById('loginBtn');

form.onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.innerText = "Signing In...";

    try {
        await auth.signInWithEmailAndPassword(email, password);
        // No need to redirect here; onAuthStateChanged handles it safely.
    } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.innerText = "Sign In";
        alert(err.message);
    }
};
</script>

</body>
</html>
